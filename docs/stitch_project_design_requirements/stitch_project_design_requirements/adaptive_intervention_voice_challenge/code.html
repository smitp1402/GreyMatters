<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Voice Challenge | The Cognitive Sanctuary</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#468fff",
                    "primary": "#acc7ff",
                    "surface-dim": "#131313",
                    "tertiary-fixed-dim": "#fbbc00",
                    "outline-variant": "#414754",
                    "secondary-container": "#3a4a5f",
                    "on-error-container": "#ffdad6",
                    "on-surface": "#e5e2e1",
                    "on-secondary": "#213145",
                    "inverse-primary": "#005cbd",
                    "surface": "#131313",
                    "on-secondary-container": "#a9bad3",
                    "on-tertiary-fixed": "#261a00",
                    "on-secondary-fixed-variant": "#38485d",
                    "surface-container-highest": "#353534",
                    "on-tertiary-fixed-variant": "#5c4300",
                    "inverse-surface": "#e5e2e1",
                    "secondary": "#b7c8e1",
                    "secondary-fixed-dim": "#b7c8e1",
                    "on-tertiary": "#402d00",
                    "surface-container-lowest": "#0e0e0e",
                    "surface-container": "#201f1f",
                    "secondary-fixed": "#d3e4fe",
                    "outline": "#8b90a0",
                    "surface-variant": "#353534",
                    "on-error": "#690005",
                    "on-primary-container": "#00285a",
                    "surface-container-high": "#2a2a2a",
                    "on-tertiary-container": "#372700",
                    "on-primary-fixed": "#001a40",
                    "tertiary": "#fbbc00",
                    "primary-fixed": "#d7e2ff",
                    "error-container": "#93000a",
                    "error": "#ffb4ab",
                    "background": "#131313",
                    "primary-fixed-dim": "#acc7ff",
                    "on-surface-variant": "#c1c6d7",
                    "on-primary-fixed-variant": "#004591",
                    "tertiary-fixed": "#ffdfa0",
                    "on-primary": "#002f67",
                    "surface-tint": "#acc7ff",
                    "surface-bright": "#393939",
                    "on-background": "#e5e2e1",
                    "surface-container-low": "#1c1b1b",
                    "inverse-on-surface": "#313030",
                    "on-secondary-fixed": "#0b1c30",
                    "tertiary-container": "#b88900"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Newsreader"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .mic-pulse {
            box-shadow: 0 0 0 0 rgba(172, 199, 255, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(172, 199, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(172, 199, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(172, 199, 255, 0); }
        }
        .waveform-bar {
            animation: wave 1.2s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 24px; }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-label selection:bg-primary/30 antialiased">
<!-- Top Navigation (Minimal Intervention Header) -->
<nav class="w-full top-0 sticky bg-surface-container-low z-50 border-b border-outline-variant/15">
<div class="flex justify-center items-center px-6 py-4 w-full">
<span class="text-xs font-black text-primary uppercase tracking-[0.2em] font-headline">Adaptive Intervention: Voice Challenge</span>
</div>
</nav>
<main class="min-h-[calc(100vh-52px)] flex flex-col items-center justify-center px-6 py-12">
<!-- Intervention Shell -->
<div class="w-full max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-12 items-center">
<!-- Question Content Layer (Left) -->
<div class="md:col-span-7 space-y-12">
<div class="space-y-4">
<div class="flex items-center gap-2 text-primary font-bold tracking-widest text-[10px] uppercase">
<span class="w-8 h-[1px] bg-primary"></span>
                        Voice Labs Intervention
                    </div>
<h1 class="font-body text-4xl md:text-6xl text-on-surface leading-tight italic">
                        "What type of bond forms in <span class="not-italic font-medium">H₂O</span>?"
                    </h1>
</div>
<!-- Speech to Text Visualization Area -->
<div class="bg-surface-container-low p-8 rounded-xl border border-outline-variant/15 relative overflow-hidden group">
<div class="absolute top-0 left-0 w-1 h-full bg-primary/40"></div>
<div class="flex items-start gap-4">
<span class="material-symbols-outlined text-primary/50 mt-1">notes</span>
<div class="space-y-2 w-full">
<div class="text-[10px] uppercase tracking-widest text-outline font-bold">Transcription Engine</div>
<div class="font-body text-2xl text-on-surface/90 min-h-[3rem]">
<span class="text-on-surface">The bond is </span>
<span class="text-primary animate-pulse">polar covalent...</span>
</div>
</div>
</div>
</div>
</div>
<!-- Visualization/Action Layer (Right) -->
<div class="md:col-span-5 flex flex-col items-center justify-center space-y-8">
<!-- Circular Pulse HUD -->
<div class="relative flex items-center justify-center">
<!-- Outer Ring Decor -->
<div class="absolute w-64 h-64 border border-outline-variant/10 rounded-full"></div>
<div class="absolute w-56 h-56 border border-primary/5 rounded-full"></div>
<!-- Main Mic Button -->
<button class="mic-pulse w-40 h-40 rounded-full bg-gradient-to-br from-primary to-primary-container flex flex-col items-center justify-center text-on-primary-container z-10 shadow-2xl transition-transform active:scale-95">
<span class="material-symbols-outlined text-5xl mb-1" data-weight="fill">mic</span>
<span class="text-[10px] font-black uppercase tracking-tighter">Listening</span>
</button>
<!-- Real-time Waveform -->
<div class="absolute -bottom-8 flex items-end gap-1 h-12">
<div class="waveform-bar w-1 bg-primary/40 rounded-full" style="animation-delay: 0.1s;"></div>
<div class="waveform-bar w-1 bg-primary/60 rounded-full" style="animation-delay: 0.3s;"></div>
<div class="waveform-bar w-1 bg-primary rounded-full" style="animation-delay: 0.5s;"></div>
<div class="waveform-bar w-1 bg-primary/70 rounded-full" style="animation-delay: 0.2s;"></div>
<div class="waveform-bar w-1 bg-primary/30 rounded-full" style="animation-delay: 0.4s;"></div>
</div>
</div>
<!-- HUD Metrics -->
<div class="grid grid-cols-2 gap-4 w-full max-w-[280px]">
<div class="bg-surface-container-high p-4 rounded-lg flex flex-col items-center">
<span class="text-[10px] text-outline uppercase font-bold mb-1">Clarity</span>
<span class="text-xl font-headline font-bold text-primary">94%</span>
</div>
<div class="bg-surface-container-high p-4 rounded-lg flex flex-col items-center">
<span class="text-[10px] text-outline uppercase font-bold mb-1">Latency</span>
<span class="text-xl font-headline font-bold text-secondary">12ms</span>
</div>
</div>
</div>
</div>
</main>
<!-- Background Abstract Pattern -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-1/4 -right-20 w-96 h-96 bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 -left-20 w-96 h-96 bg-secondary-container/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
