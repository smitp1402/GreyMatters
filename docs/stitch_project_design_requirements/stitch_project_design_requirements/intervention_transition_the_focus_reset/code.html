<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Focus Reset | Cognitive Sanctuary</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#213145",
                        "tertiary-fixed": "#ffdfa0",
                        "on-secondary-fixed": "#0b1c30",
                        "primary": "#acc7ff",
                        "on-tertiary": "#402d00",
                        "inverse-on-surface": "#313030",
                        "tertiary-fixed-dim": "#fbbc00",
                        "surface-variant": "#353534",
                        "on-tertiary-fixed": "#261a00",
                        "on-primary": "#002f67",
                        "on-surface-variant": "#c1c6d7",
                        "surface-dim": "#131313",
                        "on-tertiary-container": "#372700",
                        "background": "#131313",
                        "inverse-surface": "#e5e2e1",
                        "secondary-fixed": "#d3e4fe",
                        "surface-container-highest": "#353534",
                        "on-primary-fixed-variant": "#004591",
                        "outline-variant": "#414754",
                        "secondary-fixed-dim": "#b7c8e1",
                        "inverse-primary": "#005cbd",
                        "surface-bright": "#393939",
                        "primary-fixed-dim": "#acc7ff",
                        "surface": "#131313",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#a9bad3",
                        "surface-container-low": "#1c1b1b",
                        "on-background": "#e5e2e1",
                        "secondary": "#b7c8e1",
                        "on-error-container": "#ffdad6",
                        "surface-container": "#201f1f",
                        "on-surface": "#e5e2e1",
                        "surface-container-high": "#2a2a2a",
                        "on-error": "#690005",
                        "tertiary-container": "#b88900",
                        "tertiary": "#fbbc00",
                        "on-secondary-fixed-variant": "#38485d",
                        "primary-container": "#468fff",
                        "surface-container-lowest": "#0e0e0e",
                        "outline": "#8b90a0",
                        "on-primary-container": "#00285a",
                        "surface-tint": "#acc7ff",
                        "error-container": "#93000a",
                        "primary-fixed": "#d7e2ff",
                        "on-tertiary-fixed-variant": "#5c4300",
                        "on-primary-fixed": "#001a40",
                        "secondary-container": "#3a4a5f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Newsreader"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(28, 27, 27, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
        }
        .serif-text {
            font-family: 'Newsreader', serif;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center overflow-hidden">
<!-- Top Navigation Suppression: Not a top-level destination, following "Shell Visibility & Relevance" rule -->
<main class="relative z-10 w-full max-w-4xl px-6 flex flex-col items-center text-center">
<!-- Visual Anchor: Atmospheric Image -->
<div class="mb-12 relative w-64 h-64 md:w-80 md:h-80">
<div class="absolute inset-0 bg-primary/10 rounded-full blur-3xl"></div>
<img alt="Zen focus reset" class="w-full h-full object-cover rounded-full mix-blend-lighten opacity-80 grayscale" data-alt="Abstract macro shot of a single water droplet creating perfect ripples in deep obsidian water with ethereal blue light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAcW8sLEKwaGIMWdvXjc7YVaIXW8sJUR9xLy_mBfCIrekFkhsvPY4CLqWXGjIM7vhUPUbmzEaYP7g35MRfBdBbOHuItAiXL6LRViiKmEqH8Fckq19sEUxHkiAS7j-nj5VEoXR9FrwJyDsr0KC-oN9L2xCq8Zy4j1Has_zTCjrfFUwGRuxxRnbNVppgMIewzt4D_K0QB1nZXkMcvJ3rhe-ePlFDfJs-XQuFGmywYUv1_DXpzh-qR_OqrVdofNCflRuutXfCuZHgVy0"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-full h-full border border-primary/20 rounded-full animate-pulse"></div>
</div>
</div>
<!-- The Primary Learning Layer (Content) -->
<div class="space-y-6">
<h1 class="serif-text text-5xl md:text-7xl font-extralight tracking-tight text-on-surface italic">
                Let's pause here for a moment.
            </h1>
<p class="font-headline text-on-surface-variant text-lg md:text-xl font-light tracking-wide max-w-xl mx-auto leading-relaxed">
                Your focus is drifting. Let's try a quick activity to reset.
            </p>
</div>
<!-- Clinical HUD Metrics (Contextual) -->
<div class="mt-16 grid grid-cols-2 gap-8 md:gap-16 items-center">
<div class="flex flex-col items-center">
<span class="text-on-surface-variant font-label text-[10px] uppercase tracking-[0.2em] mb-2">Alpha Variance</span>
<span class="text-primary text-2xl font-headline font-light">+14.2%</span>
</div>
<div class="flex flex-col items-center">
<span class="text-on-surface-variant font-label text-[10px] uppercase tracking-[0.2em] mb-2">Neural Load</span>
<span class="text-tertiary text-2xl font-headline font-light">Elevated</span>
</div>
</div>
<!-- Minimalist CTA -->
<div class="mt-20">
<button class="group relative px-12 py-4 bg-surface-tint text-on-primary font-headline font-semibold tracking-wider rounded-md transition-all duration-500 hover:shadow-[0_0_30px_rgba(172,199,255,0.3)] hover:-translate-y-1">
                Start Activity
                <div class="absolute inset-0 border border-white/20 rounded-md scale-110 opacity-0 group-hover:scale-100 group-hover:opacity-100 transition-all duration-500"></div>
</button>
</div>
</main>
<!-- Background Layering (Tonal Depth) -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<!-- Layer 1: Surface Base -->
<div class="absolute inset-0 bg-surface"></div>
<!-- Layer 2: Subtle Tonal Gradients (No Borders) -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-container/5 rounded-full blur-[100px]"></div>
<!-- Subtle Texture / Grain -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/asfalt-dark.png')]"></div>
</div>
<!-- HUD Overlay Element (Glassmorphism) -->
<div class="fixed top-8 left-8 hidden md:block">
<div class="glass-panel px-4 py-3 rounded-lg border border-white/5 flex items-center gap-4">
<div class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></div>
<div class="flex flex-col">
<span class="text-[10px] font-label text-on-surface-variant uppercase tracking-widest">Status</span>
<span class="text-xs font-headline text-on-surface font-medium italic">Intervention Required</span>
</div>
</div>
</div>
<!-- Floating Utility (Suppressed except for mandatory logic) -->
<div class="fixed bottom-8 right-8 flex gap-4">
<button class="w-12 h-12 flex items-center justify-center glass-panel rounded-full text-on-surface-variant hover:text-primary transition-colors border border-white/10">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</div>
</body></html>
