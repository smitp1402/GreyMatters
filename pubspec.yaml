name: neurolearn
description: EEG-adaptive learning platform — Neurosity Crown + Flutter
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # WebSocket
  web_socket_channel: ^2.4.0

  # State management
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0

  # Local database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Speech-to-text (voice intervention)
  speech_to_text: ^7.0.0

  # Text-to-speech (voice intervention question readout)
  flutter_tts: ^4.2.0

  # YouTube player for web
  url_launcher: ^6.2.0

  # Supabase (cloud database + realtime)
  supabase_flutter: ^2.8.0

  # Utilities
  uuid: ^4.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/curriculum/
    - assets/images/
