<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NeuroLearn | Cognitive Sanctuary Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#0b1c30",
                        "surface-dim": "#131313",
                        "secondary": "#b7c8e1",
                        "surface-container-highest": "#353534",
                        "surface-container-high": "#2a2a2a",
                        "tertiary-container": "#b88900",
                        "surface-container": "#201f1f",
                        "surface-variant": "#353534",
                        "on-primary-container": "#00285a",
                        "primary-fixed-dim": "#acc7ff",
                        "secondary-container": "#3a4a5f",
                        "surface": "#131313",
                        "background": "#131313",
                        "on-tertiary-fixed": "#261a00",
                        "on-background": "#e5e2e1",
                        "on-tertiary-container": "#372700",
                        "outline": "#8b90a0",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#b7c8e1",
                        "tertiary-fixed-dim": "#fbbc00",
                        "primary-container": "#468fff",
                        "on-surface-variant": "#c1c6d7",
                        "surface-container-lowest": "#0e0e0e",
                        "outline-variant": "#414754",
                        "primary": "#acc7ff",
                        "on-secondary": "#213145",
                        "inverse-on-surface": "#313030",
                        "tertiary-fixed": "#ffdfa0",
                        "error-container": "#93000a",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#a9bad3",
                        "inverse-surface": "#e5e2e1",
                        "surface-tint": "#acc7ff",
                        "on-tertiary-fixed-variant": "#5c4300",
                        "surface-bright": "#393939",
                        "on-tertiary": "#402d00",
                        "inverse-primary": "#005cbd",
                        "on-surface": "#e5e2e1",
                        "tertiary": "#fbbc00",
                        "on-error-container": "#ffdad6",
                        "on-primary": "#002f67",
                        "surface-container-low": "#1c1b1b",
                        "primary-fixed": "#d7e2ff",
                        "on-secondary-fixed-variant": "#38485d",
                        "secondary-fixed": "#d3e4fe",
                        "on-primary-fixed": "#001a40",
                        "on-primary-fixed-variant": "#004591"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Newsreader"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(53, 53, 52, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .brainwave-bg {
            background-image: radial-gradient(circle at 50% 50%, rgba(172, 199, 255, 0.05) 0%, transparent 50%),
                              linear-gradient(rgba(19, 19, 19, 1), rgba(19, 19, 19, 0.8));
        }
        .ghost-border {
            outline: 1px solid rgba(65, 71, 84, 0.2);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-label selection:bg-primary selection:text-on-primary-container overflow-hidden min-h-screen flex items-center justify-center brainwave-bg">
<!-- Decorative background elements -->
<div class="fixed inset-0 pointer-events-none opacity-20">
<svg class="absolute w-full h-full" viewbox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
<path d="M0,500 Q250,400 500,500 T1000,500" fill="none" stroke="#acc7ff" stroke-width="0.5"></path>
<path d="M0,520 Q250,420 500,520 T1000,520" fill="none" stroke="#acc7ff" stroke-width="0.3"></path>
<path d="M0,480 Q250,380 500,480 T1000,480" fill="none" stroke="#acc7ff" stroke-width="0.2"></path>
</svg>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[480px] px-6">
<!-- Brand Header -->
<div class="text-center mb-10">
<h1 class="font-headline font-black text-primary text-3xl uppercase tracking-[0.2em] mb-2">NeuroLearn</h1>
<p class="font-body italic text-on-surface-variant text-lg">Enter the Cognitive Sanctuary</p>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-xl ghost-border p-10 shadow-2xl">
<form action="#" class="space-y-8" method="POST">
<!-- Role Selector -->
<div class="space-y-4">
<label class="text-xs uppercase tracking-widest text-outline font-bold block">Select Protocol</label>
<div class="grid grid-cols-2 gap-3 p-1.5 bg-surface-container-lowest rounded-lg">
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="role" type="radio" value="student"/>
<div class="flex items-center justify-center gap-2 py-3 px-4 rounded-md transition-all duration-200 peer-checked:bg-secondary-container peer-checked:text-primary hover:bg-surface-container-high">
<span class="material-symbols-outlined text-[20px]" data-icon="school">school</span>
<span class="text-sm font-semibold">Student</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="role" type="radio" value="teacher"/>
<div class="flex items-center justify-center gap-2 py-3 px-4 rounded-md transition-all duration-200 peer-checked:bg-secondary-container peer-checked:text-primary hover:bg-surface-container-high">
<span class="material-symbols-outlined text-[20px]" data-icon="clinical_notes">clinical_notes</span>
<span class="text-sm font-semibold">Teacher</span>
</div>
</label>
</div>
</div>
<!-- Input Group -->
<div class="space-y-6">
<div class="space-y-2 group">
<label class="text-xs uppercase tracking-widest text-outline font-bold ml-1" for="email">Identity Tag</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-surface-container-highest focus:ring-1 focus:ring-primary transition-all duration-300" id="email" name="email" placeholder="email@sanctuary.edu" type="email"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary" data-icon="fingerprint">fingerprint</span>
</div>
</div>
<div class="space-y-2 group">
<div class="flex justify-between items-center px-1">
<label class="text-xs uppercase tracking-widest text-outline font-bold" for="password">Secure Key</label>
<a class="text-[10px] uppercase tracking-widest text-primary hover:underline font-bold" href="#">Recover Access</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-surface-container-highest focus:ring-1 focus:ring-primary transition-all duration-300" id="password" name="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary" data-icon="lock">lock</span>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-2">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-extrabold uppercase tracking-widest py-5 rounded-lg shadow-[0_0_20px_rgba(172,199,255,0.2)] active:scale-[0.98] transition-all duration-200" type="submit">
                        Initialize Session
                    </button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    New to the sanctuary? 
                    <a class="text-primary hover:text-primary-fixed ml-1 font-bold transition-colors" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Compliance Branding -->
<div class="mt-12 flex flex-col items-center gap-4 opacity-40">
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-[24px]" data-icon="security" data-weight="fill" style="font-variation-settings: 'FILL' 1;">security</span>
<span class="material-symbols-outlined text-[24px]" data-icon="psychology" data-weight="fill" style="font-variation-settings: 'FILL' 1;">psychology</span>
<span class="material-symbols-outlined text-[24px]" data-icon="monitoring" data-weight="fill" style="font-variation-settings: 'FILL' 1;">monitoring</span>
</div>
<div class="h-px w-12 bg-outline-variant"></div>
<p class="text-[10px] uppercase tracking-[0.3em] font-headline">Clinical Intelligence Protocol v4.2</p>
</div>
</main>
<!-- Side Graphic (Decorative) -->
<div class="fixed top-12 right-12 hidden lg:block text-right">
<div class="mb-4">
<span class="text-xs text-primary font-bold uppercase tracking-widest block mb-1">System Status</span>
<div class="flex items-center justify-end gap-2">
<span class="w-2 h-2 rounded-full bg-secondary-container animate-pulse"></span>
<span class="text-[10px] font-mono text-outline uppercase tracking-wider">Neural Link Active</span>
</div>
</div>
<div class="space-y-1">
<div class="h-1 w-32 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-2/3 bg-primary rounded-full"></div>
</div>
<div class="h-1 w-24 bg-surface-container-highest rounded-full overflow-hidden ml-auto">
<div class="h-full w-1/2 bg-secondary-container rounded-full"></div>
</div>
</div>
</div>
<!-- Background Portrait/Texture Reference -->
<div class="fixed bottom-0 left-0 w-full h-1/3 pointer-events-none opacity-10 bg-gradient-to-t from-primary/20 to-transparent"></div>
</body></html>
