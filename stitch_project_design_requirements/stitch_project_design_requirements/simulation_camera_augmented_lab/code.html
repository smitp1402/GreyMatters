</div>

<div class="absolute inset-0 vignette pointer-events-none"></div>
</div>

<div class="w-1 h-1 bg-tertiary rounded-full"></div>
</div>
</div>
</div>
</div>

<div class="glass-panel p-4 rounded-xl border border-outline-variant/15 flex flex-col gap-1">

</div>

<div class="mt-4 flex justify-center gap-1">
<div class="h-[2px] w-8 bg-primary"></div>
<div class="h-[2px] w-2 bg-surface-variant"></div>

</div>
</div>
